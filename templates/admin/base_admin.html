<!DOCTYPE html>
<html lang="en" class="h-full" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Admin — GroupGo{% endblock %}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/css/app.css"/>
  <style>
    :root {
      --bg-page: #0f172a; --bg-card: rgba(30, 41, 59, 0.84); --bg-input: rgba(15, 23, 42, 0.55);
      --bg-hover: rgba(99,102,241,0.08); --border: rgba(148, 163, 184, 0.16);
      --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #64748b;
      --header-bg: rgba(15, 23, 42, 0.76);
    }
    [data-theme="light"] {
      --bg-page: #f1f5f9; --bg-card: rgba(255, 255, 255, 0.88); --bg-input: rgba(248, 250, 252, 0.9);
      --bg-hover: rgba(99,102,241,0.06); --border: rgba(148, 163, 184, 0.22);
      --text-primary: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
      --header-bg: rgba(255, 255, 255, 0.8);
    }
    html { scroll-behavior: smooth; }
    body { background-color: var(--bg-page); color: var(--text-primary); font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; transition: background-color 0.2s, color 0.2s; }
    .card { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 1rem; box-shadow: 0 18px 45px rgba(2,6,23,0.18); transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s; }
    .card:hover { box-shadow: 0 24px 60px rgba(2,6,23,0.2); border-color: rgba(129,140,248,0.22); }
    [data-theme="light"] .card { box-shadow: 0 18px 40px rgba(15,23,42,0.08); }
    [data-theme="light"] .card:hover { box-shadow: 0 20px 48px rgba(15,23,42,0.1); }
    .input-base { background-color: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); border-radius: 0.9rem; padding: 0.7rem 0.9rem; font-size: 0.875rem; transition: border-color 0.15s, box-shadow 0.15s; width: 100%; outline: none; }
    .input-base:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.12); }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border-radius: 999px; padding: 0.65rem 1.2rem; font-weight: 700; transition: all 0.18s; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.45rem; border: 1px solid rgba(129,140,248,0.3); box-shadow: 0 12px 28px rgba(79,70,229,0.24); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 16px 34px rgba(79,70,229,0.3); }
    .btn-primary:active { transform: translateY(0); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border-radius: 999px; padding: 0.65rem 1.2rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.45rem; border: 1px solid rgba(239,68,68,0.28); transition: all 0.18s; box-shadow: 0 10px 22px rgba(220,38,38,0.22); }
    .btn-danger:hover { transform: translateY(-1px); box-shadow: 0 14px 30px rgba(220,38,38,0.28); }
    .btn-danger:active { transform: translateY(0); }
    .btn-ghost { background-color: rgba(15,23,42,0.1); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 999px; padding: 0.65rem 1.05rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem; transition: all 0.15s; }
    .btn-ghost:hover { border-color: rgba(99,102,241,0.3); color: var(--text-primary); background-color: rgba(99,102,241,0.07); }
    .btn-ghost:active { transform: scale(0.98); }
    .status-draft { background: #1e3a5f; color: #60a5fa; }
    .status-open { background: #14532d; color: #4ade80; }
    .status-closed { background: #422006; color: #fb923c; }
    .status-archived { background: #1e1b4b; color: #818cf8; }
    [data-theme="light"] .status-draft { background: #dbeafe; color: #1d4ed8; }
    [data-theme="light"] .status-open { background: #dcfce7; color: #16a34a; }
    [data-theme="light"] .status-closed { background: #ffedd5; color: #c2410c; }
    [data-theme="light"] .status-archived { background: #ede9fe; color: #7c3aed; }
    #gg-toast { transition: transform 0.25s ease, opacity 0.25s ease; }
    #gg-confirm { backdrop-filter: blur(2px); }
    .app-header { backdrop-filter: blur(18px); background: var(--header-bg); }
    .brand-mark { width: 2.75rem; height: 2.75rem; border-radius: 1rem; display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(99,102,241,0.22), rgba(14,165,233,0.22)); box-shadow: inset 0 1px 0 rgba(255,255,255,0.16); }
    .admin-nav { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.35rem; border-radius: 999px; border: 1px solid var(--border); background: rgba(15,23,42,0.14); }
    [data-theme="light"] .admin-nav { background: rgba(255,255,255,0.7); }
    .admin-nav a { min-height: 0; min-width: 0; }
    [data-theme="light"] .nav-tab-inactive { color: #64748b; }
    [data-theme="light"] .nav-tab-inactive:hover { color: #0f172a; background: #f1f5f9; }
    [data-theme="light"] header { border-color: #e2e8f0; }
    [data-theme="light"] tbody tr:hover { background: rgba(99,102,241,0.04) !important; }
    [data-theme="light"] .divide-slate-800 > :not([hidden]) ~ :not([hidden]) { border-color: #e2e8f0; }
    [data-theme="light"] .text-slate-400 { color: #475569; }
    [data-theme="light"] .text-slate-500 { color: #64748b; }
    [data-theme="light"] .text-slate-600 { color: #475569; }
    [data-theme="light"] .bg-slate-700 { background-color: #e2e8f0; }
    [data-theme="light"] [class~="bg-slate-700/50"] { background-color: rgba(148,163,184,0.18); }
    [data-theme="light"] [class~="bg-slate-700/30"] { background-color: rgba(148,163,184,0.1); }
    [data-theme="light"] .bg-slate-600 { background-color: #94a3b8; }
    [data-theme="light"] [class~="bg-slate-800/80"] { background-color: rgba(241,245,249,0.9); }
    [data-theme="light"] .border-slate-700 { border-color: #e2e8f0; }
    [data-theme="light"] .border-slate-600 { border-color: #cbd5e1; }
    [data-theme="light"] .border-slate-800 { border-color: #e2e8f0; }
    [data-theme="light"] .text-white { color: #0f172a; }
    [data-theme="light"] [class~="bg-slate-700/20"] { background: rgba(99,102,241,0.04); }
    [data-theme="light"] .bg-slate-900 { background-color: #ffffff; }
    [data-theme="light"] .bg-slate-800 { background-color: #f1f5f9; }
    [data-theme="light"] .opacity-40 { opacity: 0.45; }
    [data-theme="light"] .text-indigo-300 { color: #4f46e5; }
    [data-theme="light"] .text-indigo-400 { color: #4338ca; }
    [data-theme="light"] [class~="bg-indigo-900/60"] { background-color: rgba(99,102,241,0.15); }
    [data-theme="light"] [class~="bg-green-900/40"] { background-color: rgba(22,163,74,0.12); }
    [data-theme="light"] .text-green-400 { color: #16a34a; }
    [data-theme="light"] .border-green-800 { border-color: #86efac; }
    [data-theme="light"] .bg-amber-500 { background-color: #d97706; }
    /* Light mode contrast fixes */
    [data-theme="light"] .text-slate-300 { color: #334155; }
    [data-theme="light"] .bg-slate-700 { background-color: #cbd5e1; }
    [data-theme="light"] [class~="bg-slate-700/50"] { background-color: rgba(203,213,225,0.5); }
    [data-theme="light"] .border-slate-600 { border-color: #94a3b8; }
    [data-theme="light"] .border-slate-700 { border-color: #cbd5e1; }
    [data-theme="light"] .text-indigo-300 { color: #4338ca; }
    [data-theme="light"] [class~="bg-indigo-900/60"] { background-color: rgba(79,70,229,0.15); border-color: rgba(79,70,229,0.3); }
    [data-theme="light"] .text-purple-300 { color: #7c3aed; }
    [data-theme="light"] [class~="bg-purple-900/60"] { background-color: rgba(124,58,237,0.15); border-color: rgba(124,58,237,0.3); }
    [data-theme="light"] [class~="bg-green-900/60"] { background-color: rgba(22,163,74,0.15); border-color: rgba(22,163,74,0.3); }
    [data-theme="light"] [class~="bg-amber-900/40"] { background-color: rgba(217,119,6,0.15); }
    [data-theme="light"] .text-amber-400 { color: #d97706; }
    [data-theme="light"] tbody td { color: #334155; }
    [data-theme="light"] .font-medium { color: #1e293b; }
    [data-theme="light"] .text-xs.text-slate-500 { color: #64748b; }
    /* ── Help tooltip (ⓘ) ─────────────────────────────────────────────────── */
    .gg-help-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 999px;
      font-size: 10px; font-weight: 700; line-height: 1;
      color: var(--text-muted); border: 1px solid var(--text-muted);
      cursor: pointer; flex-shrink: 0; vertical-align: middle;
      margin-left: 4px; opacity: 0.7; transition: opacity 0.15s, color 0.15s, border-color 0.15s;
      position: relative; user-select: none;
    }
    .gg-help-icon:hover { opacity: 1; color: #818cf8; border-color: #818cf8; }
    .gg-help-popover {
      position: fixed; z-index: 9999;
      background: #1e293b; border: 1px solid rgba(148,163,184,0.22);
      border-radius: 10px; padding: 10px 12px;
      max-width: 280px; width: max-content;
      font-size: 12px; line-height: 1.5; color: #cbd5e1;
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .gg-help-popover.has-title .gg-help-popover-title {
      font-weight: 700; color: #f1f5f9; margin-bottom: 4px; font-size: 12px;
    }
    /* ── Help ? button ─────────────────────────────────────────────────────── */
    .gg-help-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 999px;
      font-size: 11px; font-weight: 700; line-height: 1;
      color: var(--text-muted); border: 1px solid var(--border);
      cursor: pointer; flex-shrink: 0; vertical-align: middle;
      margin-left: 5px; opacity: 0.65; transition: opacity 0.15s, color 0.15s, border-color 0.15s;
      background: transparent; user-select: none;
    }
    .gg-help-btn:hover { opacity: 1; color: #818cf8; border-color: #818cf8; }
    /* ── Help modal (? button click) ──────────────────────────────────────── */
    #gg-help-modal {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.55); align-items: center; justify-content: center; padding: 24px;
    }
    #gg-help-modal.open { display: flex; }
    #gg-help-modal-box {
      background: #1e293b; border: 1px solid rgba(148,163,184,0.22);
      border-radius: 14px; padding: 20px 20px 18px;
      max-width: 360px; width: 100%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    #gg-help-modal-title { font-size: 14px; font-weight: 800; color: #f1f5f9; margin-bottom: 8px; }
    #gg-help-modal-body { font-size: 13px; line-height: 1.6; color: #94a3b8; }
    #gg-help-modal-close {
      float: right; font-size: 16px; color: #64748b; cursor: pointer;
      margin: -4px -4px 0 8px; padding: 4px; line-height: 1; transition: color 0.15s;
    }
    #gg-help-modal-close:hover { color: #f1f5f9; }
    /* breadcrumb chevron alignment */
    .breadcrumb { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 1rem; flex-wrap: wrap; }
    .breadcrumb > * { display: inline-flex; align-items: center; line-height: 1; }
    .breadcrumb a { color: var(--text-secondary); text-decoration: none; transition: color 0.15s; }
    .breadcrumb a:hover { color: #818cf8; }
    .breadcrumb .sep { color: var(--text-muted); }
    .breadcrumb .current { color: #818cf8; font-weight: 500; }
    .breadcrumb .active { color: var(--text-primary); font-weight: 500; }
  </style>
</head>
<body class="min-h-screen overflow-x-hidden">

  <!-- Admin header -->
  <header class="app-header border-b sticky top-0 z-40" style="border-color:var(--border);">
    <div class="page-shell-wide py-0">
      <div class="flex flex-col gap-3 py-4 lg:flex-row lg:items-center lg:justify-between">
        <div class="flex items-center justify-between gap-3">
          <a href="/admin" class="flex items-center gap-3 no-min-size">
            <span class="brand-mark text-xl no-min-size">🎬</span>
            <div class="min-w-0">
              <div class="font-bold text-lg tracking-tight leading-none" style="color:var(--text-primary)">GroupGo</div>
              <div class="text-xs mt-1 hidden sm:block" style="color:var(--text-secondary)">Admin console</div>
            </div>
          </a>
        </div>
        <div class="flex items-center gap-3 justify-between lg:justify-end">
          <nav class="admin-nav mr-0 lg:mr-2">
            <a href="/admin" class="text-sm px-4 py-3.5 rounded-full font-medium transition-colors nav-tab-inactive leading-none {% if active_page == 'dashboard' %}bg-indigo-600 text-white shadow-lg shadow-indigo-900/30{% else %}text-slate-400 hover:text-white hover:bg-slate-700/50{% endif %}">Dashboard</a>
            <a href="/admin/theaters" class="text-sm px-4 py-3.5 rounded-full font-medium transition-colors nav-tab-inactive leading-none {% if active_page == 'theaters' %}bg-indigo-600 text-white shadow-lg shadow-indigo-900/30{% else %}text-slate-400 hover:text-white hover:bg-slate-700/50{% endif %}">Theaters</a>
            <a href="/admin/members" class="text-sm px-4 py-3.5 rounded-full font-medium transition-colors nav-tab-inactive leading-none {% if active_page == 'members' %}bg-indigo-600 text-white shadow-lg shadow-indigo-900/30{% else %}text-slate-400 hover:text-white hover:bg-slate-700/50{% endif %}">Members</a>
          </nav>
      <!-- Logout -->
      <form method="post" action="/admin/logout" style="display:inline;">
        <button type="submit" title="Sign out" class="w-10 h-10 rounded-full flex items-center justify-center transition-colors hover:bg-red-900/30 text-slate-400 hover:text-red-400 border" style="border-color:var(--border);background:rgba(15,23,42,0.12);">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
        </button>
      </form>
      <!-- Theme toggle -->
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode"
        class="w-10 h-10 rounded-full flex items-center justify-center transition-colors hover:bg-slate-700/50 text-slate-400 hover:text-white border" style="border-color:var(--border);background:rgba(15,23,42,0.12);">
        <svg id="theme-icon-dark" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/>
        </svg>
        <svg id="theme-icon-light" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/>
        </svg>
      </button>
        </div>
      </div>
    </div>
  </header>

  <main class="page-shell-wide pt-6">
    {% block content %}{% endblock %}
  </main>

  <!-- Toast -->
  <div id="gg-toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] px-4 py-2.5 rounded-xl shadow-2xl text-sm font-medium pointer-events-none translate-y-4 opacity-0 flex items-center gap-2"></div>

  <!-- Confirm dialog -->
  <div id="gg-confirm" class="hidden fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4">
    <div class="card w-full max-w-sm p-5 shadow-2xl">
      <p id="gg-confirm-msg" class="text-sm mb-5" style="color:var(--text-primary)"></p>
      <div class="flex gap-2 justify-end">
        <button id="gg-confirm-cancel" class="btn-ghost text-sm">Cancel</button>
        <button id="gg-confirm-ok" class="btn-danger text-sm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Help tooltip popover (shared singleton) -->
  <div id="gg-help-popover" class="gg-help-popover" style="display:none;">
    <div class="gg-help-popover-title"></div>
    <div class="gg-help-popover-body"></div>
  </div>

  <!-- Help modal (? button) -->
  <div id="gg-help-modal" onclick="if(event.target===this)closeHelpModal()">
    <div id="gg-help-modal-box">
      <span id="gg-help-modal-close" onclick="closeHelpModal()">✕</span>
      <div id="gg-help-modal-title"></div>
      <div id="gg-help-modal-body"></div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    // ── Theme ──────────────────────────────────────────────────────────────────
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('theme-icon-dark').classList.toggle('hidden', t === 'light');
      document.getElementById('theme-icon-light').classList.toggle('hidden', t === 'dark');
    }
    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      localStorage.setItem('gg-theme', next);
      applyTheme(next);
    }
    applyTheme(localStorage.getItem('gg-theme') || 'dark');

    // ── Help tooltip (ⓘ hover) ────────────────────────────────────────────────
    (function() {
      const pop = document.getElementById('gg-help-popover');
      let hideTimer = null;
      function showHelpTooltip(el) {
        clearTimeout(hideTimer);
        const body = el.dataset.helpBody || '';
        const title = el.dataset.helpTitle || '';
        pop.querySelector('.gg-help-popover-title').textContent = title;
        pop.querySelector('.gg-help-popover-body').textContent = body;
        pop.classList.toggle('has-title', !!title);
        pop.style.display = 'block';
        const r = el.getBoundingClientRect();
        const pw = 280; const ph = pop.offsetHeight || 80;
        let left = r.left + r.width / 2 - pw / 2;
        let top = r.bottom + 6;
        if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
        if (left < 8) left = 8;
        if (top + ph > window.innerHeight - 8) top = r.top - ph - 6;
        pop.style.left = left + 'px';
        pop.style.top = top + 'px';
        pop.style.maxWidth = pw + 'px';
      }
      function hideHelpTooltip() {
        hideTimer = setTimeout(() => { pop.style.display = 'none'; }, 120);
      }
      document.addEventListener('mouseover', e => {
        const el = e.target.closest('.gg-help-icon');
        if (el) showHelpTooltip(el);
      });
      document.addEventListener('mouseout', e => {
        if (e.target.closest('.gg-help-icon')) hideHelpTooltip();
      });
      document.addEventListener('click', e => {
        const el = e.target.closest('.gg-help-icon');
        if (el) { e.stopPropagation(); showHelpTooltip(el); }
        else hideHelpTooltip();
      });
    })();

    // ── Help modal (? button) ─────────────────────────────────────────────────
    function openHelpModal(title, body) {
      document.getElementById('gg-help-modal-title').textContent = title;
      document.getElementById('gg-help-modal-body').textContent = body;
      document.getElementById('gg-help-modal').classList.add('open');
    }
    function closeHelpModal() {
      document.getElementById('gg-help-modal').classList.remove('open');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeHelpModal(); });

    // ── Confirm dialog ─────────────────────────────────────────────────────────
    function showConfirm(msg, onOk, okLabel = 'Confirm', danger = true) {
      const dialog = document.getElementById('gg-confirm');
      document.getElementById('gg-confirm-msg').textContent = msg;
      const okBtn = document.getElementById('gg-confirm-ok');
      okBtn.textContent = okLabel;
      okBtn.className = `text-sm ${danger ? 'btn-danger' : 'btn-primary'}`;
      dialog.classList.remove('hidden');
      const cancel = () => { dialog.classList.add('hidden'); };
      const ok = () => { dialog.classList.add('hidden'); onOk(); };
      document.getElementById('gg-confirm-cancel').onclick = cancel;
      okBtn.onclick = ok;
      dialog.onclick = (e) => { if (e.target === dialog) cancel(); };
    }
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
