<div class="surface-muted p-4 mt-5 hero-status-card{% if hero_panel_classes is defined and hero_panel_classes %} {{ hero_panel_classes }}{% endif %}">
  <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <div class="min-w-0">
      <p class="text-sm font-semibold text-white">{{ hero_panel_title }}</p>
      <p class="text-sm text-slate-400 mt-1">{{ hero_panel_description }}</p>
    </div>
    {% if hero_actions_partial is defined and hero_actions_partial %}
    <div class="flex flex-col items-start gap-2">
      {% include hero_actions_partial %}
    </div>
    {% endif %}
  </div>
</div>
