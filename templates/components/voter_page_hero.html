<section class="page-hero mb-6" id="voter-page-hero">
  <span class="page-eyebrow hidden md:inline-flex">{{ hero_eyebrow }}</span>
  <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
    <div class="flex-1">
      <h1 class="page-title text-white">{{ poll.title }}</h1>
      {% if hero_body_partial is defined and hero_body_partial %}
      <div class="mt-4 max-w-2xl">
        {% include hero_body_partial %}
      </div>
      {% endif %}
    </div>
  </div>
</section>
