<div class="vote-controls" id="movie-toggle-{{ event_id }}">
  <button
    {% if not (movies_opted_in | default(false)) or poll_preferences.has_completed_voting %}disabled{% endif %}
    hx-post="/api/votes/movie"
    hx-vals='{"event_id": {{ event_id }}, "vote": "{% if current_vote == "yes" %}abstain{% else %}yes{% endif %}"}'
    hx-target="#movie-toggle-{{ event_id }}"
    hx-swap="outerHTML"
    hx-indicator="#movie-toggle-{{ event_id }}"
    aria-pressed="{{ 'true' if current_vote == 'yes' else 'false' }}"
    class="vote-button flex-1 flex items-center justify-center gap-2 sm:gap-2.5 border text-sm font-semibold transition-all px-3 sm:px-4 {% if not (movies_opted_in | default(false)) or poll_preferences.has_completed_voting %}vote-button-locked{% endif %}
      {% if current_vote == 'yes' %}vote-yes-active border-green-500 shadow-lg shadow-green-900/20{% else %}bg-slate-700/60 text-slate-200 border-slate-600 hover:border-green-600 hover:text-green-400{% endif %}">
    <span class="inline-flex items-center justify-center w-7 h-7 sm:w-8 sm:h-8 rounded-full flex-shrink-0 {% if current_vote == 'yes' %}bg-white/15{% else %}bg-green-500/10 text-green-400{% endif %}">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
      </svg>
    </span>
    <span class="flex flex-col items-center sm:items-start leading-tight text-center sm:text-left min-w-0">
      <span class="text-sm sm:text-sm">Yes</span>
      <span class="text-[10px] sm:text-[11px] font-medium leading-tight {% if current_vote == 'yes' %}text-white/80{% else %}text-slate-400{% endif %}">Keep it in the running</span>
    </span>
  </button>
  <button
    {% if not (movies_opted_in | default(false)) or poll_preferences.has_completed_voting %}disabled{% endif %}
    hx-post="/api/votes/movie"
    hx-vals='{"event_id": {{ event_id }}, "vote": "{% if current_vote == "no" %}abstain{% else %}no{% endif %}"}'
    hx-target="#movie-toggle-{{ event_id }}"
    hx-swap="outerHTML"
    hx-indicator="#movie-toggle-{{ event_id }}"
    aria-pressed="{{ 'true' if current_vote == 'no' else 'false' }}"
    class="vote-button flex-1 flex items-center justify-center gap-2 sm:gap-2.5 border text-sm font-semibold transition-all px-3 sm:px-4 {% if not (movies_opted_in | default(false)) or poll_preferences.has_completed_voting %}vote-button-locked{% endif %}
      {% if current_vote == 'no' %}vote-no-active border-red-500 shadow-lg shadow-red-900/20{% else %}bg-slate-700/60 text-slate-200 border-slate-600 hover:border-red-600 hover:text-red-400{% endif %}">
    <span class="inline-flex items-center justify-center w-7 h-7 sm:w-8 sm:h-8 rounded-full flex-shrink-0 {% if current_vote == 'no' %}bg-white/15{% else %}bg-red-500/10 text-red-400{% endif %}">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </span>
    <span class="flex flex-col items-center sm:items-start leading-tight text-center sm:text-left min-w-0">
      <span class="text-sm sm:text-sm">No</span>
      <span class="text-[10px] sm:text-[11px] font-medium leading-tight {% if current_vote == 'no' %}text-white/80{% else %}text-slate-400{% endif %}">Rule it out</span>
    </span>
  </button>
</div>
