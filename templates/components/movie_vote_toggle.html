<div id="movie-toggle-{{ event_id }}" style="display:flex;flex-direction:column;gap:8px;">
  <div style="display:flex;gap:8px;">
    <button
      {% if not (movies_opted_in | default(false)) or poll_preferences.has_completed_voting %}disabled{% endif %}
      hx-post="/api/votes/movie"
      hx-vals='{"event_id": {{ event_id }}, "vote": "{% if current_vote == "yes" %}abstain{% else %}yes{% endif %}"}'
      hx-target="#movie-toggle-{{ event_id }}"
      hx-swap="outerHTML"
      hx-indicator="#movie-toggle-{{ event_id }}"
      aria-pressed="{{ 'true' if current_vote == 'yes' else 'false' }}"
      class="gg-vote-btn {% if current_vote == 'yes' %}yes-active{% endif %} {% if not (movies_opted_in | default(false)) or poll_preferences.has_completed_voting %}disabled{% endif %}">
      <span style="font-size:14px;">✓</span>
      <span style="display:flex;flex-direction:column;align-items:center;gap:1px;">
        <span>Yes</span>
        {% if current_vote == 'yes' %}<span style="font-size:9px;font-weight:500;opacity:0.7;">Keep it in</span>{% endif %}
      </span>
    </button>
    <button
      {% if not (movies_opted_in | default(false)) or poll_preferences.has_completed_voting %}disabled{% endif %}
      hx-post="/api/votes/movie"
      hx-vals='{"event_id": {{ event_id }}, "vote": "{% if current_vote == "no" %}abstain{% else %}no{% endif %}"}'
      hx-target="#movie-toggle-{{ event_id }}"
      hx-swap="outerHTML"
      hx-indicator="#movie-toggle-{{ event_id }}"
      aria-pressed="{{ 'true' if current_vote == 'no' else 'false' }}"
      class="gg-vote-btn {% if current_vote == 'no' %}no-active{% endif %} {% if not (movies_opted_in | default(false)) or poll_preferences.has_completed_voting %}disabled{% endif %}">
      <span style="font-size:14px;">✕</span>
      <span style="display:flex;flex-direction:column;align-items:center;gap:1px;">
        <span>No</span>
        {% if current_vote == 'no' %}<span style="font-size:9px;font-weight:500;opacity:0.7;">Rule it out</span>{% endif %}
      </span>
    </button>
  </div>

  {% if current_vote == 'no' %}
  {% set current_reason = veto_reasons.get(event_id) if veto_reasons else None %}
  <div style="display:flex;flex-wrap:wrap;gap:6px;padding:0 2px;">
    <span style="font-size:11px;color:var(--gg-text-dim);align-self:center;">Why?</span>
    {% for reason, label in [('Schedule','📅 Schedule'),('Seen it','🍿 Seen it'),('Not my vibe','👎 Not my vibe'),('Other...','❓ Other')] %}
    <button
      {% if poll_preferences.has_completed_voting %}disabled{% endif %}
      hx-post="/api/votes/movie"
      hx-vals='{"event_id": {{ event_id }}, "vote": "no", "veto_reason": "{{ reason }}"}'
      hx-target="#movie-toggle-{{ event_id }}"
      hx-swap="outerHTML"
      style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;cursor:pointer;border:1px solid;
        {% if current_reason == reason %}background:var(--gg-border-light);border-color:var(--gg-border-light);color:var(--gg-text);{% else %}background:transparent;border-color:var(--gg-border);color:var(--gg-text-dim);{% endif %}">
      {{ label }}
    </button>
    {% endfor %}
  </div>
  {% endif %}
</div>
