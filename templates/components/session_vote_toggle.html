<div id="session-toggle-{{ session_id }}">
  <button
    hx-post="/api/votes/session"
    hx-vals='{"session_id": {{ session_id }}, "vote": "{% if current_vote == "can_do" %}cant_do{% else %}can_do{% endif %}"}'
    hx-target="#session-toggle-{{ session_id }}"
    hx-swap="outerHTML"
    class="w-full flex items-center justify-center gap-1.5 py-2 px-3 rounded-lg border text-xs font-semibold transition-all
      {% if current_vote == 'can_do' %}vote-cando-active border-green-500{% else %}bg-slate-700/50 text-slate-400 border-slate-600 hover:border-green-600 hover:text-green-400{% endif %}">
    {% if current_vote == 'can_do' %}
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
    </svg>
    Can Do
    {% else %}
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
    </svg>
    Can't Do
    {% endif %}
  </button>
</div>
