<div id="session-toggle-{{ session_id }}">
  {% set session_is_enabled = s.event_id in (enabled_showtime_event_ids | default([])) %}
  {% set confirmed = current_vote == 'can_do' %}
  <button
    {% if not poll_preferences.is_participating or poll_preferences.has_completed_voting or not session_is_enabled %}disabled{% endif %}
    hx-post="/api/votes/session"
    hx-vals='{"session_id": {{ session_id }}, "vote": "{% if confirmed %}cant_do{% else %}can_do{% endif %}"}'
    hx-target="#session-card-{{ session_id }}"
    hx-swap="outerHTML"
    aria-pressed="{{ 'true' if confirmed else 'false' }}"
    class="gg-confirm-toggle {% if confirmed %}confirmed{% endif %}">✓</button>
</div>
