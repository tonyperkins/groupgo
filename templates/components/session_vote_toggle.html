<div id="session-toggle-{{ session_id }}">
  <button
    hx-post="/api/votes/session"
    hx-vals='{"session_id": {{ session_id }}, "vote": "{% if current_vote == "can_do" %}cant_do{% else %}can_do{% endif %}"}'
    hx-target="#session-toggle-{{ session_id }}"
    hx-swap="outerHTML"
    class="w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border text-sm font-bold transition-all shadow-sm
           {% if current_vote == 'can_do' %}vote-cando-active border-green-500{% else %}bg-[var(--bg-input)] text-slate-400 border-[var(--border)] hover:border-green-500/50 hover:bg-green-500/10 hover:text-green-500{% endif %}">
    {% if current_vote == 'can_do' %}
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
    </svg>
    Can Do
    {% else %}
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
    </svg>
    Can't Do
    {% endif %}
  </button>
</div>
