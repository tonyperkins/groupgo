<!DOCTYPE html>
<html lang="en" class="h-full" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0f172a"/>
  <title>{% block title %}GroupGo{% endblock %}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/css/app.css"/>
  <style>
    :root {
      --bg-page: #0f172a; --bg-card: #1e293b; --border: #334155;
      --text-primary: #f8fafc; --text-secondary: #94a3b8; --header-bg: rgba(15, 23, 42, 0.85); --header-border: #334155;
    }
    [data-theme="light"] {
      --bg-page: #f8fafc; --bg-card: #ffffff; --border: #e2e8f0;
      --text-primary: #0f172a; --text-secondary: #475569; --header-bg: rgba(255, 255, 255, 0.85); --header-border: #e2e8f0;
    }
    html { scroll-behavior: smooth; }
    body { background-color: var(--bg-page); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; transition: background-color 0.2s, color 0.2s; }
    
    /* Header Blur */
    header { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom-color: var(--header-border) !important; }

    /* Cards */
    .card { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1); transition: box-shadow 0.2s, transform 0.2s; }
    .card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.15), 0 4px 6px -4px rgba(0,0,0,0.1); }
    [data-theme="light"] .card { box-shadow: 0 1px 3px 0 rgba(0,0,0,0.05), 0 1px 2px -1px rgba(0,0,0,0.05); }
    [data-theme="light"] .card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04); }
    
    /* Buttons */
    .btn-primary { background-color: #4f46e5; color: white; border-radius: 0.75rem; padding: 0.625rem 1.25rem; font-weight: 600; font-size: 0.875rem; transition: all 0.2s; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; border: none; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .btn-primary:hover { background-color: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.4); }
    .btn-primary:active { transform: translateY(0); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    
    .btn-ghost { background-color: transparent; color: var(--text-secondary); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.625rem 1.25rem; font-weight: 500; font-size: 0.875rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s; }
    .btn-ghost:hover { border-color: #6366f1; color: #818cf8; background-color: rgba(99,102,241,0.08); }
    [data-theme="light"] .btn-ghost:hover { color: #4f46e5; background-color: rgba(79,70,229,0.06); }
    .btn-ghost:active { transform: scale(0.98); }
    
    /* Vote states */
    .vote-yes-active { background-color: #16a34a !important; color: white !important; border-color: #16a34a !important; box-shadow: 0 4px 12px rgba(22,163,74,0.3) !important; }
    .vote-no-active { background-color: #dc2626 !important; color: white !important; border-color: #dc2626 !important; box-shadow: 0 4px 12px rgba(220,38,38,0.3) !important; }
    .vote-cando-active { background-color: #16a34a !important; color: white !important; border-color: #16a34a !important; box-shadow: 0 2px 8px rgba(22,163,74,0.2) !important; }
    .vote-cantdo-active { background-color: #dc2626 !important; color: white !important; border-color: #dc2626 !important; box-shadow: 0 2px 8px rgba(220,38,38,0.2) !important; }
    
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }
    #gg-toast { transition: transform 0.25s ease, opacity 0.25s ease; }
    
    /* Light mode specific text adjustments */
    [data-theme="light"] .text-slate-400 { color: #64748b; }
    [data-theme="light"] .text-slate-500 { color: #475569; }
    [data-theme="light"] .text-slate-300 { color: #64748b; }
    [data-theme="light"] .text-white { color: #0f172a; }
    [data-theme="light"] .bg-slate-900 { background-color: #ffffff; }
    [data-theme="light"] .bg-slate-700 { background-color: #cbd5e1; }
    [data-theme="light"] .bg-slate-600 { background-color: #94a3b8; }
    [data-theme="light"] .border-slate-700 { border-color: #e2e8f0; }
    [data-theme="light"] .border-slate-600 { border-color: #cbd5e1; }
    [data-theme="light"] .divide-slate-700 > :not([hidden]) ~ :not([hidden]) { border-color: #e2e8f0; }
    [data-theme="light"] .bg-slate-800 { background-color: #f1f5f9; }
    [data-theme="light"] .bg-slate-700\/50 { background-color: rgba(148,163,184,0.18); }
    [data-theme="light"] .bg-slate-700\/30 { background-color: rgba(148,163,184,0.1); }
    [data-theme="light"] .text-indigo-400 { color: #4338ca; }
    [data-theme="light"] .text-indigo-300 { color: #4f46e5; }
    [data-theme="light"] .bg-amber-900\/60 { background-color: rgba(217,119,6,0.15); }
    [data-theme="light"] .text-amber-300 { color: #d97706; }
    [data-theme="light"] .bg-green-900\/40 { background-color: rgba(22,163,74,0.12); }
    [data-theme="light"] .text-green-400 { color: #16a34a; }
    [data-theme="light"] .hover\:bg-slate-600:hover { background-color: #94a3b8; }
    [data-theme="light"] .text-red-400 { color: #dc2626; }
  </style>
</head>
<body class="h-full flex flex-col min-h-screen overflow-x-hidden">

  <!-- Header -->
  <header class="border-b px-4 py-3 flex items-center justify-between sticky top-0 z-40" style="background:var(--header-bg);border-color:var(--border);">
    <div class="flex items-center gap-2">
      <span class="text-indigo-500 text-xl">🎬</span>
      <span class="font-bold text-lg tracking-tight" style="color:var(--text-primary)">GroupGo</span>
    </div>
    <div class="flex items-center gap-2">
      {% block header_right %}{% endblock %}
      <button onclick="toggleTheme()" title="Toggle theme"
        class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-400 hover:text-white transition-colors">
        <svg id="theme-icon-dark" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/>
        </svg>
        <svg id="theme-icon-light" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main class="flex-1 {% block main_class %}overflow-y-auto{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <!-- Bottom navigation (voter) -->
  {% block bottom_nav %}{% endblock %}

  <!-- Toast -->
  <div id="gg-toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-full shadow-xl text-sm font-medium pointer-events-none translate-y-4 opacity-0"></div>

  <script src="/static/js/app.js"></script>
  <script>
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('theme-icon-dark').classList.toggle('hidden', t === 'light');
      document.getElementById('theme-icon-light').classList.toggle('hidden', t === 'dark');
    }
    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      localStorage.setItem('gg-theme', next);
      applyTheme(next);
    }
    applyTheme(localStorage.getItem('gg-theme') || 'dark');

    let _toastTimer;
    function showToast(msg, type = 'success') {
      const el = document.getElementById('gg-toast');
      const bg = { success: 'bg-green-700 text-white', error: 'bg-red-700 text-white', info: 'bg-indigo-700 text-white' };
      el.className = `fixed bottom-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-full shadow-xl text-sm font-medium ${bg[type] || bg.success}`;
      el.textContent = msg;
      el.style.transform = 'translateX(-50%) translateY(0)';
      el.style.opacity = '1';
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => {
        el.style.transform = 'translateX(-50%) translateY(1rem)';
        el.style.opacity = '0';
      }, 3000);
    }

    document.addEventListener('voteSaved', () => showToast('✓ Vote saved'));
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
