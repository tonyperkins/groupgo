{% extends "base.html" %}
{% block title %}Who are you? — GroupGo{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="card p-8 w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🎬</div>
      <h1 class="text-2xl font-bold text-white">GroupGo</h1>
      <p class="text-slate-400 mt-1 text-sm">Family movie night coordinator</p>
    </div>

    <h2 class="text-lg font-semibold text-slate-200 mb-4 text-center">Who are you?</h2>

    {% if error %}
    <div class="bg-red-900/50 border border-red-700 text-red-300 text-sm px-4 py-2 rounded-lg mb-4">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/identify" class="space-y-3">
      {% for user in users %}
      <button type="submit" name="user_id" value="{{ user.id }}"
        class="w-full flex items-center gap-3 bg-slate-700 hover:bg-indigo-600 border border-slate-600 hover:border-indigo-500 text-white rounded-xl px-4 py-4 text-left transition-all duration-150 group">
        <div class="w-10 h-10 rounded-full bg-indigo-800 flex items-center justify-center text-lg font-bold text-indigo-200 group-hover:bg-indigo-500 transition-colors">
          {{ user.name[0].upper() }}
        </div>
        <span class="font-medium text-base">{{ user.name }}</span>
        <svg class="ml-auto w-5 h-5 text-slate-500 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
      {% endfor %}
    </form>
  </div>
</div>
{% endblock %}
